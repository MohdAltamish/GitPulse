stages:
  - validate
  - test

variables:
  NODE_VERSION: "20"

# Validate that all imports resolve and the CLI loads
validate:
  stage: validate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --help
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Run the unit test suite (deterministic scoring engine, no API key needed)
unit-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Run the blast radius analysis with mock data (no API key needed)
test-mock:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - echo "Testing module imports..."
    - node -e "import('./orbit-client.js').then(() => console.log('✓ orbit-client.js'))"
    - node -e "import('./orbit.js').then(() => console.log('✓ orbit.js'))"
    - node -e "import('./gitlab.js').then(() => console.log('✓ gitlab.js'))"
    - node -e "import('./report.js').then(() => console.log('✓ report.js'))"
    - echo "All modules loaded successfully"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Real blast-radius analysis. Runs the deterministic (keyless) pipeline by
# default; if ANTHROPIC_API_KEY is set in CI/CD variables the agent will use
# the LLM-driven loop instead. Targets a real file in THIS project.
analyze:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --file orbit.js --project-id ${GITLAB_PROJECT_ID:-$CI_PROJECT_ID}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true
