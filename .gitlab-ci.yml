stages:
  - validate
  - test
  - gate

variables:
  NODE_VERSION: "20"
  # GitPulse queries Orbit via REST; analyze job uses GITLAB_TOKEN (api scope).

# Contribute Track: every MR must carry the orbit::hackathon label to qualify.
# Fails the MR pipeline if the label is missing so no MR is merged unlabeled.
label-guard:
  stage: validate
  image: alpine:3.20
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      LABELS=$(curl -sf --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" \
        | jq -r '.labels[]?')
      echo "MR labels: ${LABELS}"
      if echo "${LABELS}" | grep -qx 'orbit::hackathon'; then
        echo "✓ orbit::hackathon label present"
      else
        echo "✗ Missing required 'orbit::hackathon' label for the Contribute Track."
        exit 1
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Validate that all imports resolve and the CLI loads
validate:
  stage: validate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --help
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Run the unit test suite (deterministic scoring engine, no API key needed)
unit-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Run the blast radius analysis with mock data (no API key needed)
test-mock:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - echo "Testing module imports..."
    - node -e "import('./orbit-client.js').then(() => console.log('✓ orbit-client.js'))"
    - node -e "import('./orbit.js').then(() => console.log('✓ orbit.js'))"
    - node -e "import('./gitlab.js').then(() => console.log('✓ gitlab.js'))"
    - node -e "import('./report.js').then(() => console.log('✓ report.js'))"
    - echo "All modules loaded successfully"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Real blast-radius analysis. Runs the deterministic (keyless) pipeline by
# default; if ANTHROPIC_API_KEY is set the agent uses the LLM-driven loop.
#
# Data source for the report:
#   - Queries the Orbit knowledge graph over REST (POST /api/v4/orbit/query).
#     CI auto-provides CI_API_V4_URL + CI_JOB_TOKEN, so this is attempted
#     automatically and yields data_source: "orbit-remote".
#   - For the most reliable access (if the job token is restricted for the
#     Orbit endpoint), add a masked GITLAB_TOKEN CI/CD variable with `api` scope.
#   - If Orbit is unreachable, it cleanly falls back to real static import
#     analysis (data_source: "static-analysis"), never silent demo data.
analyze:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --file orbit.js --project-id ${GITLAB_PROJECT_ID:-$CI_PROJECT_ID}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Proof of real Orbit graph data. --require-orbit makes the job fail unless the
# report's data_source is "orbit-remote", and uploads the JSON as a judge-visible
# artifact. allow_failure so a missing token never blocks the MR.
orbit-proof:
  stage: test
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --file orbit.js --project-id ${GITLAB_PROJECT_ID:-$CI_PROJECT_ID} --format json --require-orbit | tee orbit-report.json
  artifacts:
    paths:
      - orbit-report.json
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Enforcing risk gate: a HIGH-risk change BLOCKS the pipeline (no allow_failure).
# This is what turns GitPulse from "prints a report" into "changes behavior".
risk-gate:
  stage: gate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --file orbit.js --project-id ${GITLAB_PROJECT_ID:-$CI_PROJECT_ID} --fail-on HIGH
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Post the blast-radius report as a comment on the MR (idempotent). Soft-fails
# if no api-scoped GITLAB_TOKEN is configured. Requires CI/CD var GITLAB_TOKEN.
mr-report:
  stage: gate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - node cli.js --file orbit.js --project-id ${GITLAB_PROJECT_ID:-$CI_PROJECT_ID} --comment
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true
